<!doctype html>
<html lang="mr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Colourful ABC - Kids</title>
<style>
  .banner {
  background: url('pokemon.png.jpg');
  background-size: cover;
  background-position: center;
  height: 300px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:36px;
  font-weight:bold;
  text-shadow:3px 3px 6px black;
}
  :root{
    --bg: #fff9f0;
    --card:#fff;
    --accent:#ff6b6b;
    --muted:#6b6b6b;
    --shadow: 0 8px 20px rgba(30,30,60,0.08);
    font-family: "Segoe UI", Roboto, "Noto Sans", sans-serif;
  }
  body{

  }
  header{ text-align:center; margin-bottom:18px;}
  h1{ margin:0; font-size:28px;}
  p.lead{ margin:6px 0 0; color:var(--muted); }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    gap:14px;
    max-width:1100px;
    margin:20px auto;
  }

  .card{
    background:var(--card);
    border-radius:16px;
    padding:14px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    cursor:pointer;
    transition: transform 220ms cubic-bezier(.2,.9,.2,1), box-shadow 220ms;
    user-select:none;
  }
  .card:active{ transform: scale(0.98); }
  .card:hover{ transform: translateY(-6px) scale(1.02); box-shadow: 0 18px 40px rgba(30,30,60,0.12); }

  .letter{
    font-size:54px;
    font-weight:700;
    line-height:1;
    color:var(--accent);
  }
  .emoji{
    font-size:36px;
  }
  .word{
    font-size:16px;
    color:#333;
    font-weight:600;
  }
  .controls{ text-align:center; margin-top:18px;}
  .btn{
    display:inline-block; padding:8px 12px; border-radius:10px;
    background:var(--accent); color:white; text-decoration:none; margin:6px;
  }
  footer{ text-align:center; color:var(--muted); margin-top:22px; font-size:13px;}
</style>
</head>
<body>
  <div class="banner">
  Learn • Play • Grow
</div>
<header>
  <h1>आकर्षक A-Z अल्फाबेट कार्ड्स</h1>
  <p class="lead">क्लिक करा — अक्षर बोलेल आणि छोटा sound play होईल (browser TTS + generated beep).</p>
</header>

<div class="grid" id="grid"></div>

<div class="controls">
  <a class="btn" id="ttsSettings">TTS सेटिंग बदल</a>
  <a class="btn" id="playAll">सर्व प्ले करा</a>
</div>

<footer>हे कॉपीराईट-फ्री (browser TTS + generated tones) वापरून बनवलं आहे.</footer>

<script>
const letters = [
  ["A","Apple","🍎"],["B","Ball","⚽"],["C","Cat","🐱"],["D","Dog","🐶"],
  ["E","Elephant","🐘"],["F","Fish","🐟"],["G","Grapes","🍇"],["H","Hat","🎩"],
  ["I","Ice-cream","🍨"],["J","Juice","🧃"],["K","Kite","🪁"],["L","Lion","🦁"],
  ["M","Moon","🌙"],["N","Nest","🪺"],["O","Orange","🍊"],["P","Parrot","🦜"],
  ["Q","Queen","👑"],["R","Rabbit","🐰"],["S","Sun","☀️"],["T","Tree","🌳"],
  ["U","Umbrella","☂️"],["V","Van","🚐"],["W","Water","💧"],["X","Xylophone","🎶"],
  ["Y","Yoyo","🪀"],["Z","Zebra","🦓"]
];

const grid = document.getElementById('grid');

function createCard([letter, word, emoji]){
  const card = document.createElement('button');
  card.className = 'card';
  card.type = 'button';
  card.innerHTML = `<div class="letter">${letter}</div><div class="emoji">${emoji}</div><div class="word">${word}</div>`;
  // accessibility
  card.setAttribute('aria-label', `${letter} for ${word}`);
  card.addEventListener('click', ()=> playLetter(letter, word));
  return card;
}

letters.forEach(l => grid.appendChild(createCard(l)));

// --- Audio helpers ---
const synth = window.speechSynthesis;
let ttsRate = 0.95, ttsPitch = 1.05;
function speak(text){
  if(!synth) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = ttsRate; u.pitch = ttsPitch;
  // choose a kid-friendly voice if available
  const voices = synth.getVoices();
  if(voices && voices.length){
    // prefer a voice with 'child' or known friendly voices heuristically
    const prefer = voices.find(v=>/child|kids|junior|serif|female/i.test(v.name)) || voices[0];
    if(prefer) u.voice = prefer;
  }
  synth.cancel();
  synth.speak(u);
}

// small generated beep using WebAudio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(duration=0.12, freq=880){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = freq;
  g.gain.value = 0.0001;
  o.connect(g); g.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  g.gain.linearRampToValueAtTime(0.12, now + 0.005);
  o.start(now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  o.stop(now + duration + 0.02);
}

function playLetter(letter, word){
  // pronounce letter + word
  speak(`${letter}. ${word}.`);
  // short beep to make it fun
  try{ if(audioCtx.state === 'suspended') audioCtx.resume(); }catch(e){}
  beep(0.12, 940);
}

// play all sequentially (simple)
document.getElementById('playAll').addEventListener('click', async ()=>{
  for(const [l,w] of letters){
    playLetter(l,w);
    await new Promise(r=>setTimeout(r,700)); // small gap
  }
});

// simple TTS modal-ish settings (cycle)
document.getElementById('ttsSettings').addEventListener('click', ()=>{
  ttsRate = ttsRate === 0.95 ? 1.15 : 0.95;
  ttsPitch = ttsPitch === 1.05 ? 0.95 : 1.05;
  alert('TTS setting toggled — rate:'+ttsRate.toFixed(2)+', pitch:'+ttsPitch.toFixed(2));
});
</script>
</body>
</html>
